```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XRPL Rich List Harvester v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff00; font-family: monospace; }
        .neon-glow { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 border border-green-900 bg-zinc-950 rounded-lg neon-glow">
        <h1 class="text-xl font-bold mb-2 tracking-tighter uppercase">Silent Harvester v2.0</h1>
        <p class="text-xs text-green-700 mb-6 font-bold">MODE: API_DIRECT_TO_FILE</p>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] uppercase text-green-800">Target Depth (Accounts)</label>
                <input id="targetDepth" type="number" value="1000" step="100" class="w-full bg-black border border-green-900 p-3 rounded mt-1 text-green-400 outline-none focus:border-green-400">
            </div>

            <div id="runtimeUI" class="hidden">
                <div class="flex justify-between text-[10px] mb-1">
                    <span>PROGRESS: <span id="percentText">0%</span></span>
                    <span id="counterText">0 / 0</span>
                </div>
                <div class="w-full bg-zinc-900 h-1 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-green-500 h-full w-0 transition-all duration-300"></div>
                </div>
                <p id="currentAction" class="text-[9px] mt-2 text-green-800 uppercase italic">Idle...</p>
            </div>

            <div class="flex gap-2">
                <button id="runBtn" onclick="runHarvester()" class="flex-1 bg-green-900 hover:bg-green-500 hover:text-black py-3 rounded font-bold text-xs transition-all uppercase">
                    Initialize Scan
                </button>
                <button id="downloadBtn" onclick="exportData()" class="hidden flex-1 border border-green-900 hover:bg-green-900 py-3 rounded font-bold text-xs transition-all uppercase">
                    Download Master
                </button>
            </div>
        </div>
        
        <div class="mt-8 text-[10px] text-green-900 leading-tight">
            [SYS] Identities sourced from 2026 Ledger Explorer metadata.<br>
            [SYS] CSV includes: Rank, Address, Entity_Name, Balance_XRP.
        </div>
    </div>

<script>
    let masterList = [];
    let isRunning = false;

    async function runHarvester() {
        const depth = parseInt(document.getElementById('targetDepth').value);
        const runBtn = document.getElementById('runBtn');
        const runtimeUI = document.getElementById('runtimeUI');
        const progressBar = document.getElementById('progressBar');
        const currentAction = document.getElementById('currentAction');
        const counterText = document.getElementById('counterText');
        const percentText = document.getElementById('percentText');

        if(isRunning) return;
        
        isRunning = true;
        masterList = [];
        runBtn.disabled = true;
        runBtn.innerText = "SCANNING...";
        runtimeUI.classList.remove('hidden');
        document.getElementById('downloadBtn').classList.add('hidden');

        let offset = 0;
        const pageSize = 50;

        while(offset < depth && isRunning) {
            currentAction.innerText = `Fetching accounts ${offset} to ${offset + pageSize}...`;
            
            try {
                const response = await fetch(`https://api.xrpscan.com/api/v1/balances?limit=${pageSize}&offset=${offset}`);
                if(!response.ok) throw new Error("Rate limit");

                const data = await response.json();
                if(!data || data.length === 0) break;

                // Process and Clean Data (The "Intelligence" Layer)
                data.forEach((acc, idx) => {
                    masterList.push({
                        rank: offset + idx + 1,
                        address: acc.account,
                        // Identity logic: API Name or common 2026 labels
                        identity: acc.name || detectIdentity(acc.account),
                        balance: acc.balance
                    });
                });

                offset += pageSize;
                const progress = (offset / depth) * 100;
                progressBar.style.width = `${Math.min(progress, 100)}%`;
                percentText.innerText = `${Math.round(Math.min(progress, 100))}%`;
                counterText.innerText = `${masterList.length} / ${depth}`;

                // Throttle for stability
                await new Promise(r => setTimeout(r, 250));
            } catch (e) {
                currentAction.innerText = "Error: Retrying in 2 seconds...";
                await new Promise(r => setTimeout(r, 2000));
            }
        }

        currentAction.innerText = "Capture Complete. Data buffered.";
        runBtn.disabled = false;
        runBtn.innerText = "Re-Initialize";
        document.getElementById('downloadBtn').classList.remove('hidden');
        isRunning = false;
    }

    function detectIdentity(addr) {
        // Known 2026 Anchor Wallets for fallback labeling
        const anchors = {
            "rPEPPER7kfTD9w2To4CQk6UCfuHM9c6GDY": "Ripple Escrow (Primary)",
            "rDAE53VfMvftPB4ogpWGWvzkQxfht6JPxr": "Binance Cold Storage",
            "rPyCQm8E5j78PDbrfKF24fRC7qUAk1kDMZ": "Bithumb Cold",
            "rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh": "Ripple Genesis (Founder)",
            "rRmgo6NW1W7GHjC5qEpcpQnq8NE74ZS1P": "Uphold Custody"
        };
        return anchors[addr] || "Unknown Holder";
    }

    function exportData() {
        const headers = "Rank,Address,Identity,Balance_XRP\n";
        const content = masterList.map(i => `${i.rank},${i.address},"${i.identity}",${i.balance}`).join('\n');
        const blob = new Blob([headers + content], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `XRPL_RichList_Top${masterList.length}_2026.csv`;
        a.click();
    }
</script>
</body>
</html>
